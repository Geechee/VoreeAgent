services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: voree
      POSTGRES_PASSWORD: voree
      POSTGRES_DB: voree
    ports:
      - "5432:5432"
    volumes:
      - voree_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voree"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://voree:voree@db:5432/voree
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  voree_pgdata:
