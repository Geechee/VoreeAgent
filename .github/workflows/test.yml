name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: voree
          POSTGRES_PASSWORD: voree
          POSTGRES_DB: voree
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U voree"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql+psycopg2://voree:voree@localhost:5432/voree
          ANTHROPIC_API_KEY: test-key
          VOYAGE_API_KEY: test-key
          EMBEDDING_MODEL: voyage-3.5
          EMBEDDING_DIM: "1024"
        run: python -m pytest tests/ -v
